
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AnimGram - Pro Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg: #000; --accent: #007AFF; --card: rgba(28, 28, 30, 0.7);
            --border: rgba(255, 255, 255, 0.1); --text: #fff; --sub: rgba(255, 255, 255, 0.4);
            --glass: blur(30px) saturate(200%);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }

        #splash { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .ag-logo { width: 90px; height: 90px; background: var(--accent); border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: 900; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); opacity: 0.8; } }

        #authPage { position: fixed; inset: 0; background: #000; z-index: 9000; display: none; align-items: center; justify-content: center; padding: 25px; }
        .modal-card { width: 100%; max-width: 360px; background: var(--card); padding: 30px; border-radius: 30px; border: 1px solid var(--border); backdrop-filter: var(--glass); text-align: center; }
        input, textarea { width: 100%; background: #1c1c1e; border: 1px solid var(--border); padding: 15px; border-radius: 15px; color: #fff; margin-bottom: 12px; }
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--accent); color: #fff; font-weight: 700; cursor: pointer; transition: 0.3s; }

        .app-shell { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .header { padding: 60px 20px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: var(--glass); z-index: 100; }
        .logo-text { font-size: 24px; font-weight: 800; }

        #mainArea { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .post-card { background: var(--card); border-radius: 25px; border: 1px solid var(--border); margin: 15px; overflow: hidden; backdrop-filter: var(--glass); }
        .post-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .avatar-sm { width: 32px; height: 32px; border-radius: 10px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .content-box { width: 100%; aspect-ratio: 1/1; background: #050505; position: relative; overflow: hidden; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(28, 28, 30, 0.8); backdrop-filter: var(--glass); display: flex; justify-content: space-around; padding: 15px 10px 35px; border-top: 1px solid var(--border); }
        .nav-item { font-size: 24px; color: var(--sub); cursor: pointer; }
        .nav-item.active { color: #fff; }

        #codeModal { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }
        .code-header { padding: 50px 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        .tab { display: none; }
        .tab.active { display: block; }
        .h-item { display: flex; align-items: center; gap: 15px; padding: 12px; background: var(--card); border-radius: 15px; margin: 10px; border: 1px solid var(--border); cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash"><div class="ag-logo">AG</div></div>

    <div id="authPage">
        <div class="modal-card">
            <h1>AnimGram</h1>
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPass" placeholder="Parol">
            <button class="btn" id="authSubmit">DAVOM ETISH</button>
            <p id="switchBtn" style="color:var(--accent); margin-top:20px; cursor:pointer;">Ro'yxatdan o'tish</p>
        </div>
    </div>

    <div class="app-shell">
        <div class="header">
            <div class="logo-text">AnimGram</div>
            <div id="admBadge" style="display:none; color:#ff3b30;"><i class="fas fa-shield-alt"></i></div>
        </div>
        <div id="mainArea">
            <div id="tab-reels" class="tab active"><div id="feed"></div></div>
            <div id="tab-history" class="tab"><h3 style="padding:20px">Tarix (Cloud)</h3><div id="historyList"></div></div>
            <div id="tab-profile" class="tab">
                <div class="modal-card" style="margin: 50px auto;">
                    <div id="uAvatar" style="width:70px; height:70px; background:var(--accent); border-radius:20px; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:28px;">?</div>
                    <b id="uEmailText">User</b>
                    <button class="btn" id="logoutBtn" style="background:#ff3b30; margin-top:20px;">CHIQISH</button>
                </div>
            </div>
        </div>
        <div class="nav-bar">
            <i class="fas fa-play nav-item active" data-tab="tab-reels"></i>
            <i class="fas fa-history nav-item" data-tab="tab-history"></i>
            <i class="fas fa-plus-circle nav-item" id="addBtn"></i>
            <i class="fas fa-user-circle nav-item" data-tab="tab-profile"></i>
        </div>
    </div>

    <div id="codeModal">
        <div class="code-header">
            <i class="fas fa-chevron-left" id="closeCodeBtn" style="font-size:24px; color:var(--accent); cursor:pointer"></i>
            <b id="codeTitle">SOURCE</b>
            <div style="width:24px"></div>
        </div>
        <div style="flex:1; overflow:auto; padding:15px;"><pre><code id="codeBox" class="language-html"></code></pre></div>
    </div>

    <div id="addModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:11000; align-items:center; justify-content:center; padding:20px;">
        <div class="modal-card">
            <h3>Yangi Post</h3>
            <input type="text" id="pName" placeholder="Nomi">
            <textarea id="pCode" rows="8" placeholder="Kodni kiriting"></textarea>
            <button class="btn" id="publishBtn">PUBLISH</button>
            <button class="btn" style="background:none;" id="closeAddBtn">Yopish</button>
        </div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, getDoc, setDoc, updateDoc, increment, serverTimestamp, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBqrgTztsCMFP99ZrIyOMAeqV-EiKB7wBE", 
        authDomain: "mrgram-cbd1d.firebaseapp.com", 
        projectId: "mrgram-cbd1d", 
        appId: "1:1078968830234:web:3d119ea0ed3e5fbb9f84a3" 
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let me = null;
    let loginMode = true;
    const ADM = "admin@gmail.com";

    onAuthStateChanged(auth, u => {
        me = u;
        document.getElementById('splash').style.display = 'none';
        if(!u) {
            document.getElementById('authPage').style.display = 'flex';
        } else {
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('uEmailText').innerText = u.email;
            document.getElementById('uAvatar').innerText = u.email[0].toUpperCase();
            if(u.email === ADM) document.getElementById('admBadge').style.display = 'block';
            loadFeed();
        }
    });

    // Scoped CSS (ID orqali izolyatsiya)
    function scopeCSS(id, code) {
        return code.replace(/<style>([\s\S]*?)<\/style>/gi, (m, css) => {
            const scoped = css.replace(/([^\r\n,{}]+)(?=[^{}]*{)/g, s => {
                if (s.includes('@') || s.includes('%')) return s;
                return `#${id} ${s.trim()}`;
            });
            return `<style>${scoped}</style>`;
        });
    }

    async function loadFeed() {
        onSnapshot(collection(db, "animations"), async snap => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            let posts = [];
            snap.forEach(d => posts.push({id: d.id, ...d.data()}));
            posts.sort((a,b) => (b.time?.toMillis()||0) - (a.time?.toMillis()||0));

            for(let p of posts) {
                const card = document.createElement('div');
                card.className = 'post-card';
                const sid = "s_" + p.id;
                const liked = me ? (await getDoc(doc(db, "likes", `${me.uid}_${p.id}`))).exists() : false;

                card.innerHTML = `
                    <div class="post-header">
                        <div style="display:flex;align-items:center;gap:10px">
                            <div class="avatar-sm">${p.user[0].toUpperCase()}</div><b>${p.user}</b>
                        </div>
                        ${me?.email === ADM ? `<i class="fas fa-trash-alt del-post" data-id="${p.id}" style="color:#ff3b30;cursor:pointer"></i>` : ''}
                    </div>
                    <div class="content-box" id="${sid}">${scopeCSS(sid, p.code)}</div>
                    <div class="post-footer">
                        <div class="btns">
                            <i class="fa-${liked?'solid':'regular'} fa-heart like-btn ${liked?'active':''}" data-id="${p.id}"></i>
                            <i class="far fa-comment"></i>
                        </div>
                        <b style="font-size:12px">${p.likes||0} likes</b>
                    </div>`;

                // Event Listeners (To'g'ridan-to'g'ri biriktirish)
                card.querySelector('.content-box').onclick = () => addToHistoryAndOpen(p);
                card.querySelector('.like-btn').onclick = (e) => toggleLike(p.id, e.target);
                if(me?.email === ADM) {
                    card.querySelector('.del-post').onclick = (e) => {
                        e.stopPropagation();
                        if(confirm("O'chirilsinmi?")) deleteDoc(doc(db, "animations", p.id));
                    };
                }
                feed.appendChild(card);
            }
        });
    }

    async function addToHistoryAndOpen(p) {
        if(me) {
            await setDoc(doc(db, "users", me.uid, "history", p.id), {
                title: p.name,
                code: p.code,
                time: serverTimestamp()
            });
        }
        openCode(p.name, p.code);
    }

    async function renderHistory() {
        if(!me) return;
        const qH = query(collection(db, "users", me.uid, "history"), orderBy("time", "desc"), limit(20));
        onSnapshot(qH, snap => {
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            snap.forEach(d => {
                const item = d.data();
                const div = document.createElement('div');
                div.className = 'h-item';
                div.innerHTML = `<i class="fas fa-code"></i> <b>${item.title}</b>`;
                div.onclick = () => openCode(item.title, item.code);
                list.appendChild(div);
            });
        });
    }

    function openCode(title, code) {
        document.getElementById('codeTitle').innerText = title;
        document.getElementById('codeBox').textContent = code;
        Prism.highlightElement(document.getElementById('codeBox'));
        document.getElementById('codeModal').style.display = 'flex';
    }

    async function toggleLike(pid, el) {
        const lid = `${me.uid}_${pid}`, lref = doc(db, "likes", lid), pref = doc(db, "animations", pid);
        if(el.classList.contains('fa-solid')) {
            await deleteDoc(lref); await updateDoc(pref, { likes: increment(-1) });
        } else {
            await setDoc(lref, { u: me.uid }); await updateDoc(pref, { likes: increment(1) });
        }
    }

    // UI Logic
    document.getElementById('authSubmit').onclick = async () => {
        const e = document.getElementById('regEmail').value, p = document.getElementById('regPass').value;
        try { loginMode ? await signInWithEmailAndPassword(auth,e,p) : await createUserWithEmailAndPassword(auth,e,p); } catch(err){alert(err.message)}
    };

    document.getElementById('publishBtn').onclick = async () => {
        const n = document.getElementById('pName').value, c = document.getElementById('pCode').value;
        if(n && c) {
            await addDoc(collection(db, "animations"), { name:n, code:c, likes:0, user:me.email.split('@')[0], time:serverTimestamp() });
            document.getElementById('addModal').style.display = 'none';
        }
    };

    document.querySelectorAll('.nav-item[data-tab]').forEach(item => {
        item.onclick = () => {
            document.querySelectorAll('.tab, .nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(item.dataset.tab).classList.add('active');
            item.classList.add('active');
            if(item.dataset.tab === 'tab-history') renderHistory();
        };
    });

    document.getElementById('addBtn').onclick = () => document.getElementById('addModal').style.display = 'flex';
    document.getElementById('closeAddBtn').onclick = () => document.getElementById('addModal').style.display = 'none';
    document.getElementById('closeCodeBtn').onclick = () => document.getElementById('codeModal').style.display = 'none';
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(()=>location.reload());
    document.getElementById('switchBtn').onclick = () => { loginMode = !loginMode; document.getElementById('switchBtn').innerText = loginMode ? "Ro'yxatdan o'tish" : "Kirish rejimi"; };
</script>
</body>
</html>
